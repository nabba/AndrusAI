name: firecrawl

networks:
  firecrawl-backend:
    driver: bridge
  crewai-team_external:
    external: true

x-common-env: &common-env
  REDIS_URL: redis://firecrawl-redis:6379
  REDIS_RATE_LIMIT_URL: redis://firecrawl-redis:6379
  PLAYWRIGHT_MICROSERVICE_URL: http://playwright-service:3000/scrape
  USE_DB_AUTHENTICATION: "false"
  # NUQ infrastructure (required by latest Firecrawl)
  NUQ_DATABASE_URL: postgresql://firecrawl:firecrawl@firecrawl-postgres:5432/firecrawl
  NUQ_RABBITMQ_URL: amqp://guest:guest@firecrawl-rabbitmq:5672
  # Reduced from 4 workers to 1 — Firecrawl runs 8+ processes per container
  # which causes 200%+ CPU spikes even when idle. 1 worker is enough for
  # our usage pattern (occasional scrape/ingest, not high-throughput crawling)
  NUM_WORKERS_PER_QUEUE: ${FC_NUM_WORKERS:-1}
  CRAWL_CONCURRENT_REQUESTS: ${FC_CRAWL_CONCURRENT:-2}
  MAX_CONCURRENT_JOBS: ${FC_MAX_JOBS:-3}
  OLLAMA_BASE_URL: http://host.docker.internal:11434/api
  MODEL_NAME: ${FC_MODEL_NAME:-qwen3:30b-a3b}
  LOGGING_LEVEL: ${FC_LOG_LEVEL:-info}
  BULL_AUTH_KEY: ${FC_BULL_AUTH_KEY:-fc-bull-auth-botarmy}
  # SearXNG self-hosted search (free, unlimited, no API key)
  SEARXNG_ENDPOINT: http://searxng:8080

services:
  searxng:
    image: searxng/searxng:latest
    networks:
      firecrawl-backend: {}
      # Also exposed to the crewai-team external network so app/tools/web_search.py
      # can reach it via http://searxng:8080 as a Brave-API fallback. The alias
      # is required because the container's compose-default name is
      # "firecrawl-searxng-1", which won't resolve from the gateway.
      crewai-team_external:
        aliases:
          - searxng
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    restart: unless-stopped

  firecrawl-api:
    image: ghcr.io/firecrawl/firecrawl:latest
    env_file: .env
    # Run ONLY the API server — skip the harness which spawns 12+ worker processes
    # The separate firecrawl-worker container handles queue processing
    command: ["node", "dist/src/index.js"]
    environment:
      <<: *common-env
      PORT: "3002"
      HOST: "0.0.0.0"
    networks:
      - firecrawl-backend
      - crewai-team_external
    ports:
      - "127.0.0.1:3002:3002"
    depends_on:
      firecrawl-redis:
        condition: service_healthy
      firecrawl-postgres:
        condition: service_healthy
      firecrawl-rabbitmq:
        condition: service_healthy
      playwright-service:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  firecrawl-worker:
    image: ghcr.io/firecrawl/firecrawl:latest
    env_file: .env
    environment:
      <<: *common-env
    networks:
      - firecrawl-backend
    depends_on:
      firecrawl-redis:
        condition: service_healthy
      firecrawl-postgres:
        condition: service_healthy
      firecrawl-rabbitmq:
        condition: service_healthy
      playwright-service:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Run only the queue worker — skip the harness which spawns 12 processes
    command: ["node", "dist/src/services/queue-worker.js"]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    restart: unless-stopped

  playwright-service:
    image: ghcr.io/firecrawl/playwright-service:latest
    environment:
      PORT: "3000"
      BLOCK_MEDIA: ${FC_BLOCK_MEDIA:-true}
    networks:
      - firecrawl-backend
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
    shm_size: "1gb"
    restart: unless-stopped

  firecrawl-rabbitmq:
    image: rabbitmq:3-alpine
    networks:
      - firecrawl-backend
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  firecrawl-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: firecrawl
      POSTGRES_PASSWORD: firecrawl
      POSTGRES_DB: firecrawl
    networks:
      - firecrawl-backend
    volumes:
      - firecrawl-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U firecrawl"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  firecrawl-redis:
    image: redis:alpine
    networks:
      - firecrawl-backend
    command: redis-server --bind 0.0.0.0 --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - firecrawl-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 768M
    restart: unless-stopped

volumes:
  firecrawl-redis-data:
  firecrawl-postgres-data:
